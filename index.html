<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 伺服器搶修中</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="crash-banner">
        <svg aria-hidden="true" height="16" viewBox="0 0 16 16" version="1.1" width="16" data-view-component="true"
            class="octicon" style="margin-top: 2px;">
            <path
                d="M6.457 1.047c.659-1.234 2.427-1.234 3.086 0l6.082 11.39c.65 1.215-.228 2.746-1.543 2.746H1.918c-1.315 0-2.192-1.531-1.543-2.746ZM8 4a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 8 4Zm0 8a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z">
            </path>
        </svg>
        <div style="text-align: left;">
            <strong>503 Service Unavailable</strong><br>
            GitHub servers are currently experiencing issues. We are under emergency maintenance and actively working on
            a fix. Please check back shortly.
        </div>
    </div>

    <div class="terminal-window">
        <div class="terminal-header">
            <div class="window-controls">
                <span class="dot close"></span>
                <span class="dot minimize"></span>
                <span class="dot maximize"></span>
            </div>
            <div class="window-title">root@github-server:~</div>
        </div>

        <div class="terminal-body" id="terminal-body">
            <span class="cursor" id="cursor">_</span>
            <div id="interactive-prompt" class="hidden">
                <span class="prompt-symbol">root@github-server:~#</span>
                <input type="text" id="command-input" autocomplete="off" spellcheck="false" autofocus>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
